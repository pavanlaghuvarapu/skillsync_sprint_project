spring.datasource.url=jdbc:postgresql://localhost:5432/skillsync_session
spring.datasource.username=postgres
spring.datasource.password=Pavan@123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
rabbitmq.exchange=skillsync.exchange
rabbitmq.queue.notification=notification.queue
rabbitmq.routing-key.notification=notification.routing.key
feign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.mentorService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.mentorService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.mentorService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.mentorService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.userService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userService.waitDurationInOpenState=10s
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
