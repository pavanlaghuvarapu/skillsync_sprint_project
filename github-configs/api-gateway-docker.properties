spring.cloud.gateway.routes[9].filters[0]=RewritePath=/mentor-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[10].id=session-service-docs
spring.cloud.gateway.routes[10].uri=lb://session-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/session-service/v3/api-docs
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/session-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[11].id=notification-service-docs
spring.cloud.gateway.routes[11].uri=lb://notification-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/notification-service/v3/api-docs
spring.cloud.gateway.routes[11].filters[0]=RewritePath=/notification-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[12].id=review-service-docs
spring.cloud.gateway.routes[12].uri=lb://review-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/review-service/v3/api-docs
spring.cloud.gateway.routes[12].filters[0]=RewritePath=/review-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[13].id=group-service-docs
spring.cloud.gateway.routes[13].uri=lb://group-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/group-service/v3/api-docs
