spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Business service routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[2].id=mentor-service
spring.cloud.gateway.routes[2].uri=lb://mentor-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/mentors/**

spring.cloud.gateway.routes[3].id=session-service
spring.cloud.gateway.routes[3].uri=lb://session-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/sessions/**

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[5].id=review-service
spring.cloud.gateway.routes[5].uri=lb://review-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reviews/**

spring.cloud.gateway.routes[6].id=group-service
spring.cloud.gateway.routes[6].uri=lb://group-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/groups/**

# Swagger API Docs routes - proxy each service docs through gateway
spring.cloud.gateway.routes[7].id=auth-service-docs
spring.cloud.gateway.routes[7].uri=lb://auth-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/auth-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[8].id=user-service-docs
spring.cloud.gateway.routes[8].uri=lb://user-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/user-service/v3/api-docs,/v3/api-docs

