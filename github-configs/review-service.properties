spring.datasource.url=jdbc:postgresql://localhost:5432/skillsync_review
spring.datasource.username=postgres
spring.datasource.password=Pavan@123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
feign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.mentorService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.mentorService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.mentorService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.mentorService.waitDurationInOpenState=10s
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
